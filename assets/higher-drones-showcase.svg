<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" role="img" aria-labelledby="title desc">
  <title id="title">Higher Drones project showcase board</title>
  <desc id="desc">A cinematic project showcase visual with sky, project media cards, a planning path, and conservative handoff notes.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#cfeaf8"/>
      <stop offset=".54" stop-color="#f5fbff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="water" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d5c75"/>
      <stop offset="1" stop-color="#082735"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".42" stop-color="#9ed3e6"/>
      <stop offset="1" stop-color="#082735"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#063044" flood-opacity=".2"/>
    </filter>
  </defs>

  <rect width="900" height="660" rx="32" fill="url(#sky)"/>
  <path d="M0 372c132-74 253-92 378-54 150 45 275 14 522-80v422H0Z" fill="url(#water)"/>
  <path d="M0 390c184-78 324-66 468-27 129 35 262 11 432-62" fill="none" stroke="#8fcde0" stroke-width="3" opacity=".55"/>
  <path d="M92 376c80-74 157-108 230-102 78 6 132 54 214 48 84-6 148-68 270-72" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="8 12" opacity=".68"/>

  <g filter="url(#shadow)">
    <circle cx="558" cy="210" r="122" fill="#ffffff" opacity=".88"/>
    <circle cx="558" cy="210" r="76" fill="url(#lens)"/>
    <circle cx="558" cy="210" r="42" fill="#082735"/>
    <circle cx="542" cy="192" r="18" fill="#bce9f6" opacity=".8"/>
    <path d="M436 190c-52 8-91 19-117 34M680 190c50 8 89 19 115 34" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity=".9"/>
    <path d="M436 190c-52 8-91 19-117 34M680 190c50 8 89 19 115 34" fill="none" stroke="#063044" stroke-width="4" stroke-linecap="round" opacity=".28"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="76" width="258" height="184" rx="24" fill="#ffffff" opacity=".92"/>
    <text x="100" y="124" fill="#063044" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850">Project story</text>
    <text x="100" y="156" fill="#607989" font-family="Inter, Arial, sans-serif" font-size="15">Scope, angles, handoff assets</text>
    <rect x="100" y="190" width="154" height="16" rx="8" fill="#d8eaf1"/>
    <rect x="100" y="222" width="196" height="16" rx="8" fill="#d8eaf1"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="420" width="222" height="142" rx="22" fill="#ffffff"/>
    <rect x="106" y="442" width="182" height="64" rx="14" fill="#eaf5f8"/>
    <path d="M106 500c42-32 70-44 112-30 27 9 44 4 70-18v54H106Z" fill="#6c9d45" opacity=".75"/>
    <text x="106" y="536" fill="#063044" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">Exterior progress</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="338" y="420" width="222" height="142" rx="22" fill="#ffffff"/>
    <rect x="358" y="442" width="182" height="64" rx="14" fill="#fff4ea"/>
    <path d="M372 500h48v-36h70v36h34" fill="none" stroke="#e77f42" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="358" y="536" fill="#063044" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">Before / after context</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="420" width="222" height="142" rx="22" fill="#ffffff"/>
    <rect x="610" y="442" width="182" height="64" rx="14" fill="#eef0ff"/>
    <path d="M630 488c34-38 78-34 140-6" fill="none" stroke="#5d5aa8" stroke-width="8" stroke-linecap="round"/>
    <circle cx="642" cy="486" r="10" fill="#5d5aa8"/>
    <circle cx="766" cy="480" r="10" fill="#5d5aa8"/>
    <text x="610" y="536" fill="#063044" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">Media handoff</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="646" y="92" width="190" height="174" rx="22" fill="#ffffff" opacity=".92"/>
    <text x="676" y="134" fill="#063044" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Reviewed first</text>
    <g fill="none" stroke="#1b857c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="m676 174 7 7 15-18"/>
      <path d="m676 210 7 7 15-18"/>
    </g>
    <text x="710" y="180" fill="#607989" font-family="Inter, Arial, sans-serif" font-size="14">Location fit</text>
    <text x="710" y="216" fill="#607989" font-family="Inter, Arial, sans-serif" font-size="14">Permission fit</text>
  </g>
</svg>
